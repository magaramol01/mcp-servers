name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-lint:
    name: Build & Lint (affected only)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # needed for --filter=[HEAD^1]

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (affected)
        run: pnpm turbo run typecheck --filter=[HEAD^1]

      - name: Build (affected)
        run: pnpm turbo run build --filter=[HEAD^1]

  docker-build:
    name: Docker Build — ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: build-and-lint
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        package:
          - mcp-vessel-tracker
          - mcp-port-analytics
          - mcp-alerts-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/${{ matrix.package }}/Dockerfile
          push: false
          tags: fleet-orion/${{ matrix.package }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
